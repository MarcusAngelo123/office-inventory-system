{% extends "base.html" %}
{% block content %}
<h2>Inventory</h2>
<table border="1" cellpadding="5">
    <tr>
        <th>ID</th><th>Name</th><th>Category</th><th>Quantity</th><th>Min Quantity</th><th>Unit</th><th>Supplier</th><th>Location</th>
    </tr>
    {% for item in items %}
    <tr {% if item[3] <= item[4] %} style="background-color:#f99;" {% endif %}>
        <td>{{ item[0] }}</td>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
        <td>{{ item[3] }}</td>
        <td>{{ item[4] }}</td>
        <td>{{ item[5] }}</td>
        <td>{{ item[6] }}</td>
        <td>{{ item[7] }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
